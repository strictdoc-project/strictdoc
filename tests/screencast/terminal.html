<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>StrictDoc terminal</title>
  <style>
    body {
      margin: 0;
      background: #282c42;
      color: #F2F5F9;
      font: 18px/1.5 system-ui, sans-serif;
    }

    .screen {
      width: 1024px;
      height: 768px;
      padding: 0;
      box-sizing: border-box;
    }

    .window {
      height: 100%;
      background: #0b1020;
      overflow: hidden;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
    }

    .bar {
      height: 44px;
      flex: 0 0 auto;
      background: #1f2937;
      display: none;
    }

    pre {
      margin: 0;
      padding: 32px;
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      scroll-behavior: smooth;
      box-sizing: border-box;
      font: 20px/1.4 ui-monospace, SFMono-Regular, Menlo, monospace;
      white-space: pre-wrap;
    }

    .cursor::after {
      content: "▌";
      animation: blink 0.8s infinite;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="screen">
    <div class="window">
      <div class="bar"></div>
      <pre id="demoText" class="cursor"></pre>
    </div>
  </div>
</body>
</html>
