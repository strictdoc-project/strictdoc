{#
  Existing row errors are removed, current errors are inserted after the field,
  and only the selected value target is updated. The surrounding row and shared
  metadata form remain stable.
#}
<turbo-stream
  action="remove"
  targets="[js-table_view_edit-custom_meta-error='{{ form_key }}']"
>
  <template></template>
</turbo-stream>
<turbo-stream action="after" target="document-custom-meta-field-{{ form_key }}">
  <template>
    {%- for error_ in errors -%}
      <sdoc-form-error
        js-table_view_edit-custom_meta-error="{{ form_key }}"
      >{{ error_ }}</sdoc-form-error>
    {%- endfor -%}
  </template>
</turbo-stream>
<turbo-stream action="update" target="document-custom-meta-value-{{ form_key }}">
  <template>
    {%- include "screens/document/table/field_edit_mode/document_custom_meta.jinja" -%}
  </template>
</turbo-stream>
