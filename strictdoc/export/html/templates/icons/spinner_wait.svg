<svg
  class="svg_icon"
  viewBox="0 0 16 16"
  fill="none"
  stroke="currentColor"
  stroke-width="1.5"
  stroke-linecap="round"
  stroke-linejoin="round"
>
  <style>
    @keyframes sdoc_wait_spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .sdoc_wait_hand {
      transform-box: view-box;
      transform-origin: 50% 50%;
      animation: sdoc_wait_spin 0.5s linear infinite;
    }
  </style>
  <circle cx="8" cy="8" r="5"></circle>
  <circle cx="8" cy="8" r="0.5" fill="currentColor" stroke="none"></circle>
  <g class="sdoc_wait_hand">
    <line x1="8" y1="8" x2="8" y2="4"></line>
  </g>
</svg>
