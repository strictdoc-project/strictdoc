{#
  The complete custom metadata form was submitted. Remove the active row's
  errors and update only its value target after a successful save.
#}
<turbo-stream
  action="remove"
  targets="[js-table_view_edit-custom_meta-error='{{ form_key }}']"
>
  <template></template>
</turbo-stream>
<turbo-stream action="update" target="document-custom-meta-value-{{ form_key }}">
  <template>
    {%- include "screens/document/table/field_display_mode/document_custom_meta_field_value.jinja" -%}
  </template>
</turbo-stream>
