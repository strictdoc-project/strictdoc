<turbo-stream action="update" target="cell-{{ node.reserved_mid }}-{{ field_name }}">
  <template>
    {%- if field_name == 'TITLE' and field_value -%}
      <sdoc-node-title>
        {%- with field_content = field_value %}
          {%- include "components/field/index.jinja" -%}
        {%- endwith -%}
      </sdoc-node-title>
    {%- elif field_value -%}
      {%- with field_content = field_value %}
        {%- include "components/field/index.jinja" -%}
      {%- endwith -%}
    {%- endif -%}
  </template>
</turbo-stream>
