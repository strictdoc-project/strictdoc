<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>StrictDoc demo</title>
  <style>
    body {
      margin: 0;
      background: #111827;
      color: #e5e7eb;
      font: 18px/1.5 system-ui, sans-serif;
    }

    .screen {
      width: 1280px;
      height: 720px;
      padding: 48px;
      box-sizing: border-box;
    }

    .layout {
      display: grid;
      grid-template-columns: 420px 1fr;
      gap: 36px;
      height: 100%;
      align-items: center;
    }

    .copy h1 {
      margin: 0 0 18px;
      font-size: 52px;
      line-height: 1.05;
    }

    .copy p {
      margin: 0;
      color: #cbd5e1;
      font-size: 24px;
      line-height: 1.4;
    }

    .window {
      height: 430px;
      border-radius: 18px;
      background: #0b1020;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.45);
      overflow: hidden;
    }

    .bar {
      height: 44px;
      background: #1f2937;
    }

    pre {
      margin: 0;
      padding: 32px;
      font: 22px/1.55 ui-monospace, SFMono-Regular, Menlo, monospace;
      white-space: pre-wrap;
    }

    .cursor::after {
      content: "▌";
      animation: blink 0.8s infinite;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="screen">
    <div class="layout">
      <section class="copy">
        <h1>Requirements that stay traceable</h1>
        <p>
          StrictDoc keeps requirements, documentation, and traceability
          in one readable source format.
        </p>
      </section>

      <div class="window">
        <div class="bar"></div>
        <pre id="demoText" class="cursor"></pre>
      </div>
    </div>
  </div>
</body>
</html>
